ollama:
  base_url: "http://localhost:11434"
  model: "gemma3:4b"
  temperature: 0.85
  max_tokens: 1024
  context_window: 8192

tts:
  voice: "pt-BR-FranciscaNeural"
  rate: "+5%"
  pitch: "+0Hz"
  enabled: true

stt:
  model: "base"       # ~150 MB, baixado automaticamente na 1ª execução
  language: "pt"
  enabled: true

memory:
  short_term_limit: 20
  db_path: "data/memory.db"
  auto_save_facts: true

vector_memory:
  enabled: true
  chroma_path: "data/chroma"
  embed_model: "nomic-embed-text"   # modelo Ollama dedicado para embeddings (já instalado)
  search_results: 5                 # memórias semânticas recuperadas por query
  min_score: 0.45                   # similaridade mínima coseno (0-1) para incluir no contexto

server:
  host: "localhost"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

personality:
  file: "configs/personality.json"

logging:
  level: "INFO"
  file: "logs/krirk.log"

proactive:
  enabled: true
  check_interval: 30       # segundos entre cada verificação de tela
  comment_cooldown: 180    # mínimo de segundos entre comentários espontâneos
  user_idle_threshold: 60  # segundos de inatividade do usuário antes de comentar
  spotify_enabled: true    # detectar troca de música no Spotify

# ── Reflexão / vida interior (sonho + pesquisa autônoma) ─────────────────────
reflection:
  enabled: true
  active_mode: true          # true = puxa assunto sobre insights; false = só enriquece o prompt
  dream_every_hours: 3       # intervalo entre reflexões (sonhos)
  research_every_hours: 6    # intervalo entre pesquisas autônomas
  idle_seconds: 120          # só reflete com o usuário ocioso há N segundos
  proactive_cooldown: 600    # mínimo entre comentários de reflexão
  max_insights_in_prompt: 5  # insights injetados no system prompt

context_management:
  enabled: true
  max_history_tokens: 3000   # acima disto, recorta histórico e usa resumo salvo
  keep_recent: 8             # mensagens recentes sempre mantidas verbatim

knowledge_graph:
  enabled: true
  max_relations_in_prompt: 25   # máximo de relações injetadas no system prompt

# ── Providers de LLM (NVIDIA → Google → Cerebras → Ollama) ───────────────────
# Chaves ficam no .env — aqui ficam apenas os modelos customizados (opcional)
providers:
  nvidia:
    # Modelos verificados com latência < 2s no free tier (2026-06)
    models:
      # meta/llama-* estão com timeout cronico no free tier (2026-07); mistral-small
      # é o unico NVIDIA que responde rapido (~3s) — usado para chat e tools
      chat:   "mistralai/mistral-small-4-119b-2603"
      tools:  "mistralai/mistral-small-4-119b-2603"  # MoE rápido para routing
      code:   "nvidia/llama-3.3-nemotron-super-49b-v1"  # 0.9s
      ocr:    "meta/llama-3.2-11b-vision-instruct"   # phi-4-multimodal removido (410 Gone)
      vision: "meta/llama-3.2-11b-vision-instruct"   # vision capaz e leve
      embed:  "nvidia/nv-embedqa-e5-v5"              # embedding rápido
      safety: "meta/llama-guard-4-12b"
  google:
    models:
      chat:  "gemma-4-31b-it"
      tools: "gemma-4-31b-it"
      code:  "gemma-4-31b-it"
  cerebras:
    models:
      # Catálogo 2026-07 (llama3.1-* removidos do free tier)
      chat:  "gpt-oss-120b"
      tools: "gpt-oss-120b"
      code:  "zai-glm-4.7"
  ollama:
    models:
      chat:   "gemma3:4b"
      tools:  "qwen2.5-coder:7b"
      code:   "qwen2.5-coder:7b"
      embed:  "nomic-embed-text"
      vision: "gemma3:4b"     # gemma3 é multimodal — fallback local de visão
      ocr:    "gemma3:4b"

tools:
  enabled: true
  tool_model: "qwen2.5-coder:7b"   # modelo especializado para roteamento de ferramentas
  max_rounds: 4
  timeout_seconds: 10
  # Pastas EXTRAS que as ferramentas de arquivo podem acessar (além do home).
  # Cada uma vira alias pelo nome da pasta ("calendario" → C:\calendario).
  allowed_dirs:
    - "C:/calendario"        # Phantom System — agenda gamificada do usuário
  calendar_dir: "C:/calendario"   # ponte add_calendar_task/list_calendar_tasks
  whitelist:
    - get_time
    - run_powershell
    - get_clipboard
    - set_clipboard
    - get_active_window
    - open_file
    - get_system_info
    - read_file
    - list_directory
    - search_files
    - web_search
    - get_volume
    - set_volume
    - mute_volume
    - media_play_pause
    - media_next
    - media_prev
    - search_memory
    - open_url
    - open_app
    - set_timer
    - execute_python   # executa snippets Python localmente (Modo Coder)
    - delegate_code    # delega código substancial ao Claude Code CLI (background)
    - write_file       # salva arquivos dentro do home do usuário (Desktop, Documents, etc.)
    - create_folder    # cria pastas dentro do home
    - move_file        # move arquivos/pastas (organização da área de trabalho)
    # ── Fase 3: visão ──
    - read_screen      # OCR da tela via modelo de visão (NVIDIA phi-4 → gemma3 local)
    # ── Fase 4: automação ──
    - press_hotkey     # atalhos de teclado (ctrl+s, alt+tab, win+d...)
    - type_text        # digita texto na janela ativa
    - list_windows     # lista janelas abertas
    - focus_window     # traz uma janela para frente
    - fetch_url        # lê o conteúdo de uma página web (texto)
    # ── Fase 4+: browser automatizado (Playwright) ──
    - browser_open     # abre URL no Chromium controlado pela KRIRK
    - browser_read     # lê o texto da página aberta
    - browser_click    # clica em botão/link pelo texto
    - browser_fill     # preenche campos de formulário
    - browser_close    # fecha o browser automatizado
    # ── Fase 5: memória de longo prazo ──
    - search_history   # busca conversas por período ("o que falamos semana passada")
    - remember_this    # memoriza permanentemente ("lembra disso")
    # ── Agenda real: Phantom System (C:\calendario) ──
    - add_calendar_task    # coloca tarefa/compromisso na agenda gamificada
    - list_calendar_tasks  # lista o que a Krirk já adicionou
    # ── Interioridade: memes internos / cultura compartilhada ──
    - coin_term        # cunha um bordão/gíria interno de vocês dois
    - search_meme      # busca significado de meme/gíria na internet
    - set_brain_state  # a Krirk troca o próprio humor de geração (focused/chill/creative/chaos)

# ── Delegação de código ao Claude Code CLI (headless, em background) ─────────
# Tarefas substanciais de código são delegadas ao agente 'claude' instalado na
# máquina (usa a assinatura Claude do usuário). A Krirk avisa quando termina.
claude_code:
  enabled: true
  model: "sonnet"        # modelo das delegações (sonnet = rápido/econômico)
  timeout_seconds: 600   # limite por tarefa (10 min)
  max_turns: 30          # limite de turnos do agente
  show_window: true      # abre um console com o progresso ao vivo da tarefa

# ── Fase 6: plugins de terceiros em plugins/*.py ─────────────────────────────
plugins:
  enabled: true
  dir: "plugins"       # cada .py deve expor register(registry) — veja plugins/exemplo_dado.py

# ── Telegram: a Krirk no celular ─────────────────────────────────────────────
# 1. Crie um bot no @BotFather do Telegram (/newbot) e copie o token
# 2. Coloque no .env:  TELEGRAM_BOT_TOKEN=123456:ABC...
# 3. Reinicie o backend e mande /start para o bot — o primeiro chat vira o dono
telegram:
  enabled: true        # sem token no .env, fica inativo (só um aviso no log)
